version: 2
updates:
  # Go module dependencies
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      go-dependencies:
        patterns:
          - "*"

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # golangci-lint-action v7+ only supports golangci-lint v2, while this
      # repo's .golangci.yml uses the v1 config schema. Pin to the v6 line
      # until the config is migrated to v2.
      - dependency-name: "golangci/golangci-lint-action"
        update-types: ["version-update:semver-major"]

  # Base images referenced in the Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"
