name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Compile-check integration-tagged tests
        run: go test -tags=integration -run='^$' ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to v1.x: .golangci.yml uses the v1 config schema, which
          # golangci-lint v2 (now resolved by "latest") cannot parse.
          # Built from source with the runner's Go so the toolchain matches the
          # go.mod target (the prebuilt v1.64.8 binary ships built with go1.24,
          # which refuses to run against a go 1.25 target).
          version: v1.64.8
          install-mode: goinstall

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t kafka-rest-api:ci .
