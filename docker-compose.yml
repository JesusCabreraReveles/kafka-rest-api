# Local development stack: the Kafka REST API plus a single-node Kafka broker
# running in KRaft mode (no ZooKeeper). Intended for development only.
services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kra-kafka
    ports:
      # Host access via the EXTERNAL listener (avoids clashing with any local Kafka).
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Two client listeners: PLAINTEXT for in-network clients (the API),
      # EXTERNAL advertised as localhost for host clients (local dev / tests).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    container_name: kra-api
    ports:
      - "8080:8080"
    environment:
      KRA_SERVER_PORT: "8080"
      KRA_KAFKA_BROKERS: "kafka:9092"
      KRA_KAFKA_ALLOW_AUTO_TOPIC_CREATION: "true"
      KRA_LOG_LEVEL: "info"
      KRA_LOG_FORMAT: "json"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
